<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifelogue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function restoreRedirectedRoute() {
        var params = new URLSearchParams(window.location.search)
        var redirectedPath = params.get('p')

        if (!redirectedPath) return

        var redirectedQuery = params.get('q')
        var redirectedHash = params.get('h')
        var nextUrl = redirectedPath

        if (redirectedQuery) nextUrl += '?' + redirectedQuery
        if (redirectedHash) nextUrl += '#' + redirectedHash

        window.history.replaceState(null, '', nextUrl)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
